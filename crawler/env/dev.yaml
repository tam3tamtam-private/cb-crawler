# Local Mac development environment
ENV: "dev"
DATABASE_URL: ""
PGHOST: "127.0.0.1"
PGPORT: 5432
PGDATABASE: "cb_crawler"
PGUSER: "postgres"
PGPASSWORD: ""

HEADLESS: "true"
BROWSER_TIMEOUT_MS: 30000
NAVIGATION_TIMEOUT_MS: 45000
DELAY_MIN_SEC: 0.4
DELAY_MAX_SEC: 1.2
CATEGORY_RETRIES: 3
ENABLE_INFINITE_SCROLL: "true"
MAX_SCROLLS: 30
SCROLL_PAUSE_MS: 800
MAX_PAGES: 50
ENABLE_URL_PAGINATION: "true"
SITE_CONFIG_DIR: "crawler/site_configs"
BATCH_SIZE: 500
LOG_LEVEL: "INFO"
