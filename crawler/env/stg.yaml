# Staging environment
ENV: "stg"
PGPORT: 6543

HEADLESS: "true"
BROWSER_TIMEOUT_MS: 20000
NAVIGATION_TIMEOUT_MS: 10000
DELAY_MIN_SEC: 0.4
DELAY_MAX_SEC: 1.2
CATEGORY_RETRIES: 2
ENABLE_INFINITE_SCROLL: "true"
MAX_SCROLLS: 30
SCROLL_PAUSE_MS: 800
MAX_PAGES: 50
ENABLE_URL_PAGINATION: "true"
SITE_CONFIG_DIR: "crawler/site_configs"
BATCH_SIZE: 500
LOG_LEVEL: "INFO"
