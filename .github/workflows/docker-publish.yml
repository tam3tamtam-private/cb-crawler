name: Build and Publish Docker Image

on:
  push:
    branches:
      - develop
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: cb-crawler

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    needs: docker
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'stg' }}
    permissions:
      contents: read

    steps:
      - name: Deploy latest image on Oracle Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.ORACLE_VM_HOST }}
          username: ${{ vars.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ vars.ORACLE_VM_PORT || '22' }}
          script_stop: true
          script: |
            set -eu
            sudo mkdir -p /opt/cb-crawler
            sudo tee /opt/cb-crawler/cb-crawler.env >/dev/null <<EOF
            ENV=${{ github.ref == 'refs/heads/main' && 'prod' || 'stg' }}
            PGHOST=${{ vars.PGHOST }}
            PGDATABASE=${{ vars.PGDATABASE }}
            PGUSER=${{ vars.PGUSER }}
            PGPASSWORD=${{ secrets.PGPASSWORD }}
            EOF
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ vars.GHCR_USERNAME }}" --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ${{ env.CONTAINER_NAME }}:${{ github.ref == 'refs/heads/main' && 'prod' || 'stg' }}
