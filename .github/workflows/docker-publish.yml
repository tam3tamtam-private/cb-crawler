name: Build and Promote Docker Image

on:
  push:
    branches:
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: cb-crawler

jobs:
  docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.image_tag }}
            type=raw,value=stg,enable=${{ github.ref == 'refs/heads/develop' }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_stg:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: docker
    runs-on: ubuntu-latest
    environment: stg
    permissions:
      contents: read

    steps:
      - name: Deploy tested image to staging VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.ORACLE_VM_HOST }}
          username: ${{ vars.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ vars.ORACLE_VM_PORT || '22' }}
          script_stop: true
          script: |
            set -eu
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.image_tag }}"
            sudo mkdir -p /opt/cb-crawler
            printf '%s\n' \
              "ENV=stg" \
              "IMAGE_TAG=${{ needs.docker.outputs.image_tag }}" \
              "PGHOST=${{ vars.PGHOST }}" \
              "PGDATABASE=${{ vars.PGDATABASE }}" \
              "PGUSER=${{ vars.PGUSER }}" \
              "PGPASSWORD=${{ secrets.PGPASSWORD }}" \
              | sudo tee /opt/cb-crawler/cb-crawler.env >/dev/null
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ vars.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE_REF"
            docker rm -f ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --env-file /opt/cb-crawler/cb-crawler.env \
              "$IMAGE_REF"

  deploy_prod:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Deploy promoted image to production VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.ORACLE_VM_HOST }}
          username: ${{ vars.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ vars.ORACLE_VM_PORT || '22' }}
          script_stop: true
          script: |
            set -eu
            IMAGE_TAG="sha-${{ github.event.pull_request.head.sha }}"
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
            sudo mkdir -p /opt/cb-crawler
            printf '%s\n' \
              "ENV=prod" \
              "IMAGE_TAG=${IMAGE_TAG}" \
              "PGHOST=${{ vars.PGHOST }}" \
              "PGDATABASE=${{ vars.PGDATABASE }}" \
              "PGUSER=${{ vars.PGUSER }}" \
              "PGPASSWORD=${{ secrets.PGPASSWORD }}" \
              | sudo tee /opt/cb-crawler/cb-crawler.env >/dev/null
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ vars.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE_REF"
            docker tag "$IMAGE_REF" ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
            docker rm -f ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              --env-file /opt/cb-crawler/cb-crawler.env \
              "$IMAGE_REF"
